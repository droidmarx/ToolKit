name: Telegram Notification Cron

on:
  schedule:
    # Roda a cada hora (no minuto 0)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  ping-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call Cron API
        run: |
          curl -X GET "https://tool-kit-one.vercel.app/api/telegram/cron"
